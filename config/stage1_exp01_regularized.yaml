# Stage1 experiment 01: regularized baseline.

experiment:
  name: stage1_exp01_regularized
  result_root: result
  run_prefix: stage1_exp01_reg
  output_dir: null

dataset:
  root: data/IMUBlur
  split: train
  metadata_name: metadata.csv
  batch_size: 8
  num_workers: 8
  drop_last: false

validation:
  enabled: true
  split: val
  batch_size: 8
  num_workers: 4
  interval: 1
  max_batches: null

image:
  size:
    - 224
    - 320
  mean:
    - 0.485
    - 0.456
    - 0.406
  std:
    - 0.229
    - 0.224
    - 0.225

target:
  name: gyro_window
  num_vectors: 7
  vector_dim: 3
  vector_start: 0

train:
  epochs: 50
  resume: null
  loss: smooth_l1
  log_interval: 100
  checkpoint_interval: 5
  seed: 1234

model:
  name: stage1_gyro_estimation
  args:
    backbone_weights: weights/segnext_iaai.pth
    freeze_backbone: false
    head_hidden: 512
    num_vectors: 7
    vector_dim: 3
    dropout: 0.2

optimizer:
  name: adamw
  lr: 0.00005
  betas:
    - 0.9
    - 0.999
  weight_decay: 0.0005

scheduler:
  name: onecycle
  max_lr: 0.00005
  pct_start: 0.3
  div_factor: 25.0
  final_div_factor: 10000.0

distributed:
  enabled: true
  backend: auto
