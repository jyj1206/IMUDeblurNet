# Stage 1 aspect-ratio variant without ImageNet mean/std normalization.

experiment:
  name: stage1_gyro_ar_180x320_no_norm
  result_root: result
  run_prefix: stage1_ar180_nonorm
  output_dir: null

dataset:
  root: data/IMUBlur
  split: train
  metadata_name: metadata.csv
  batch_size: 8
  num_workers: 8
  drop_last: false

validation:
  enabled: true
  split: val
  batch_size: 8
  num_workers: 4
  interval: 1
  max_batches: null

image:
  size:
    - 180
    - 320
  mean: null
  std: null

target:
  name: gyro_window
  num_vectors: 7
  vector_dim: 3
  vector_start: 0

train:
  epochs: 50
  resume: null
  loss: smooth_l1
  log_interval: 100
  checkpoint_interval: 5
  seed: 1234

model:
  name: stage1_gyro_estimation
  args:
    backbone_weights: weights/segnext_iaai.pth
    freeze_backbone: false
    head_hidden: 512
    num_vectors: 7
    vector_dim: 3
    dropout: 0.1

optimizer:
  name: adamw
  lr: 0.0001
  betas:
    - 0.9
    - 0.999
  weight_decay: 0.0001

scheduler:
  name: onecycle
  max_lr: 0.0001
  pct_start: 0.3
  div_factor: 25.0
  final_div_factor: 10000.0

distributed:
  enabled: true
  backend: auto
