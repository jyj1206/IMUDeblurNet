# Stage 2 deblurring training config for IMUBlurV2.
# Values under model.args are passed to models/stage2_deblur_model.py::build_model.

experiment:
  name: stage2_deblur_v2_training
  result_root: result
  run_prefix: stage2_v2
  output_dir: null

dataset:
  root: data/IMUBlurV2
  split: train
  metadata_name: metadata.csv
  patch_size: 256
  batch_size: 4
  num_workers: 4

  motion_field_root: null
  motion_field_dir: camera_motion_field
  motion_field_ext: npy
  motion_downsample: 2

validation:
  enabled: true
  split: val
  batch_size: 8
  num_workers: 2
  interval: 5000
  max_batches: null

train:
  iterations: 200000
  epochs: null
  resume: null
  loss: psnr
  checkpoint_interval: 5000
  log_interval: 200

model:
  name: motion_guided_deblur
  args:
    img_channel: 3
    motion_channel: 12
    width: 32
    middle_blk_num: 16
    enc_blk_nums:
      - 2
      - 2
      - 2
    dec_blk_nums:
      - 1
      - 1
      - 1

optimizer:
  name: adamw
  lr: 0.0001
  betas:
    - 0.9
    - 0.999
  weight_decay: 0.0001

scheduler:
  name: cosine
  t_max: null
  eta_min: 0.0000001

distributed:
  enabled: true
  backend: auto
